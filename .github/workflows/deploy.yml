name: Deploy production (VPS)

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/career-forge-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/career-forge-frontend:${{ github.sha }}

  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy (pull + up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/career-forge"
            cd "$APP_DIR"

            # Load runtime env (domains, ports, AI keys, etc.)
            if [ -f .env ]; then
              set -a
              # shellcheck disable=SC1091
              source .env
              set +a
            fi

            export GHCR_IMAGE_NAMESPACE="ghcr.io/${{ github.repository_owner }}"
            export IMAGE_TAG="${{ github.sha }}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME || github.actor }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-build

            # Health check (API /health)
            python - <<'PY'
            import os, urllib.request, ssl
            api_domain = os.environ.get("API_DOMAIN")
            if not api_domain:
                raise SystemExit("API_DOMAIN missing from /opt/career-forge/.env")
            url = f"https://{api_domain}/health"
            ctx = ssl.create_default_context()
            with urllib.request.urlopen(url, context=ctx, timeout=15) as resp:
                data = resp.read()
            print("Health OK:", data[:200])
            PY

