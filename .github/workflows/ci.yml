name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install backend deps
        run: pip install -r apps/backend/requirements.txt

      - name: pytest
        run: make test

  harness:
    name: Agent harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: agent-verify (structure)
        run: bash scripts/agent-verify.sh

  smoke:
    name: Stack smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build --wait

      - name: smoke-stack
        run: bash scripts/smoke-stack.sh

      - name: Tear down
        if: always()
        run: docker compose down -v
