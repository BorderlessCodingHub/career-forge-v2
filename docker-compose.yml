services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careerforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careerforge}
      POSTGRES_DB: ${POSTGRES_DB:-careerforge}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerforge} -d ${POSTGRES_DB:-careerforge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-careerforge}:${POSTGRES_PASSWORD:-careerforge}@postgres:5432/${POSTGRES_DB:-careerforge}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: ./apps/web
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules

volumes:
  postgres-data:
  web-node-modules:
