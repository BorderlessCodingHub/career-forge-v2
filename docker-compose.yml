services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careerforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careerforge}
      POSTGRES_DB: ${POSTGRES_DB:-careerforge}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerforge} -d ${POSTGRES_DB:-careerforge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-careerforge}:${POSTGRES_PASSWORD:-careerforge}@postgres:5432/${POSTGRES_DB:-careerforge}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3300,http://127.0.0.1:3300}
      ENV: ${ENV:-local}
      DEBUG: ${DEBUG:-true}
      SEED_DEMO_ANA: ${SEED_DEMO_ANA:-true}
      ROADMAP_JSON_PATH: /data/roadmap.json
      API_HOST: 0.0.0.0
      API_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FORGE_SEARCH_MODEL: ${FORGE_SEARCH_MODEL:-gpt-5.4}
      FORGE_PLANNER_MODEL: ${FORGE_PLANNER_MODEL:-gpt-5.4}
      FORGE_EVALUATOR_MODEL: ${FORGE_EVALUATOR_MODEL:-gpt-5.4-mini}
      FORGE_STREAM_DELAY_SEC: ${FORGE_STREAM_DELAY_SEC:-1.5}
      DIAGNOSIS_INTERVIEW_MODEL: ${DIAGNOSIS_INTERVIEW_MODEL:-gpt-4.1-nano}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-career-forge}
    volumes:
      - ./data:/data:ro
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./apps/frontend
      target: dev
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:8000}
      API_INTERNAL_URL: http://backend:8000
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./apps/frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  postgres-data:
  frontend-node-modules:
